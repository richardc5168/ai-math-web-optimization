name: Nightly Hint Autotune PR

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autotune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Baseline verify
        run: npm run verify:all

      - name: Autotune hint JSON
        run: npm run autotune:hints

      - name: Derive report-signal candidates
        run: npm run derive:report-signals

      - name: Apply report-signal autotune
        run: npm run apply:report-signals

      - name: Re-run hint judge and scorecard
        run: |
          npm run judge:hints
          npm run golden:check
          npm run scorecard
          npm run trend:improvement
          if git diff --quiet -- golden/grade5_pack_v1.jsonl; then
            npm run check:improvement
          else
            node tools/check_improvement_trend.cjs --mode require-improvement
          fi
          npm run gate:scorecard

      - name: Detect measurable improvement
        id: improvement
        shell: bash
        run: |
          node -e "
          const fs=require('fs');
          const p='artifacts/improvement_check.json';
          const improved=fs.existsSync(p) ? !!JSON.parse(fs.readFileSync(p,'utf8')).improved : false;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `improved=${improved}\n`);
          "

      - name: Guard JSON-only changes
        shell: bash
        run: |
          if git diff --name-only | grep -E -v '^(golden/.*\.(json|jsonl)|artifacts/.*\.json|docs/improvement/.*\.json|dist_ai_math_web_pages/docs/improvement/.*\.json)$'; then
            echo "Detected non-JSON changes, aborting autotune PR."
            git diff --name-only
            exit 1
          fi

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-autotune-artifacts
          path: |
            artifacts/

      - name: Update error memory
        if: always()
        run: npm run memory:update

      - name: Upload error memory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-error-memory
          path: |
            golden/error_memory.jsonl
            artifacts/error_memory_summary.json

      - name: Create issue on nightly failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'artifacts/error_memory_summary.json';
            let summary = {
              generated_at: new Date().toISOString(),
              detected_incidents: -1,
              newly_added: -1,
              updated_existing: -1,
              total_known_errors: -1,
              open_errors: -1,
              latest: []
            };
            if (fs.existsSync(summaryPath)) {
              try {
                summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              } catch (e) {
                core.warning(`failed to parse ${summaryPath}: ${e.message}`);
              }
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const latest = Array.isArray(summary.latest) ? summary.latest.slice(0, 10) : [];
            const latestText = latest.length
              ? latest.map((x, i) => `${i + 1}. [${x.severity || 'unknown'}] ${x.source || 'unknown'} :: ${x.code || 'unknown'} :: ${x.fingerprint || ''}`).join('\n')
              : 'No parsed incident details.';

            const title = `[nightly-autotune] failed ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'Nightly autotune workflow failed.',
              '',
              `- run: ${runUrl}`,
              `- generated_at: ${summary.generated_at}`,
              `- detected_incidents: ${summary.detected_incidents}`,
              `- newly_added: ${summary.newly_added}`,
              `- updated_existing: ${summary.updated_existing}`,
              `- total_known_errors: ${summary.total_known_errors}`,
              `- open_errors: ${summary.open_errors}`,
              '',
              'Latest incident fingerprints:',
              latestText,
              '',
              'Source artifacts:',
              '- artifacts/error_memory_summary.json',
              '- golden/error_memory.jsonl'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Create Pull Request
        if: steps.improvement.outputs.improved == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/nightly-hint-autotune
          delete-branch: true
          title: "chore: nightly hint JSON autotune"
          commit-message: "chore: nightly hint JSON autotune"
          body: |
            Automated nightly hint improvement PR.

            - Runs verify and scorecard gates
            - Applies rule-based hint improvements to JSON/JSONL only
            - Enforces non-regression via improvement baseline
          add-paths: |
            golden/grade5_pack_v1.jsonl
            golden/improvement_baseline.json
            artifacts/autotune_report.json
            artifacts/report_autotune_candidates.json
            artifacts/report_autotune_apply.json
            artifacts/improvement_check.json
            artifacts/improvement_trend.json
            artifacts/improvement_trend.md
            artifacts/improvement_trend_history.jsonl
            golden/improvement_trend_history.jsonl
            docs/improvement/latest.json
            dist_ai_math_web_pages/docs/improvement/latest.json
