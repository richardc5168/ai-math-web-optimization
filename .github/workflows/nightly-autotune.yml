name: Nightly Hint Autotune PR

# ───────────────────────────────────────────────────────────
# POLICY: No automatic nightly schedule. Trigger manually via
# workflow_dispatch from VS Code chat or GitHub web UI when
# you want to run hint autotune. Removes daily cron to stop
# wasting GitHub Actions minutes.
# ───────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autotune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate critical JSON canonical format
        shell: bash
        run: node tools/check_policy_json_canonical.cjs

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Baseline verify
        id: baseline_verify
        run: npm run verify:all
        continue-on-error: true

      - name: Self-heal baseline verify failures
        if: steps.baseline_verify.outcome == 'failure'
        run: npm run self-heal:verify

      - name: Re-run baseline verify after self-heal
        if: steps.baseline_verify.outcome == 'failure'
        run: npm run verify:all

      - name: Autotune hint JSON
        run: npm run autotune:hints

      - name: Derive report-signal candidates
        run: npm run derive:report-signals

      - name: Apply report-signal autotune
        run: npm run apply:report-signals

      - name: Re-run hint judge and scorecard
        run: |
          npm run judge:hints
          npm run golden:check
          npm run scorecard
          npm run trend:improvement
          if git diff --quiet -- golden/grade5_pack_v1.jsonl; then
            npm run check:improvement
          else
            node tools/check_improvement_trend.cjs --mode require-improvement
          fi
          npm run gate:scorecard

      - name: Detect measurable improvement
        id: improvement
        shell: bash
        run: |
          node -e "
          const fs=require('fs');
          const p='artifacts/improvement_check.json';
          const improved=fs.existsSync(p) ? !!JSON.parse(fs.readFileSync(p,'utf8')).improved : false;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `improved=${improved}\n`);
          "

      - name: Guard JSON-only changes
        shell: bash
        run: |
          if git diff --name-only | grep -E -v '^(golden/.*\.(json|jsonl)|artifacts/.*\.json|docs/improvement/.*\.json|dist_ai_math_web_pages/docs/improvement/.*\.json)$'; then
            echo "Detected non-JSON changes, aborting autotune PR."
            git diff --name-only
            exit 1
          fi

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-autotune-artifacts
          path: |
            artifacts/

      - name: Update error memory
        if: always()
        run: npm run memory:update

      - name: Upload error memory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-error-memory
          path: |
            golden/error_memory.jsonl
            artifacts/error_memory_summary.json

      - name: Build agent triage report
        if: always()
        run: npm run triage:agent

      - name: Build web topic alignment report
        if: always()
        run: npm run topic:align

      - name: Build iteration output summary
        if: always()
        run: npm run summary:iteration

      - name: Create issue on nightly failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const summaryPath = 'artifacts/error_memory_summary.json';
            const triagePath = 'artifacts/agent_triage.json';
            let summary = {
              generated_at: new Date().toISOString(),
              detected_incidents: -1,
              newly_added: -1,
              updated_existing: -1,
              total_known_errors: -1,
              open_errors: -1,
              latest: []
            };
            let triage = null;
            if (fs.existsSync(summaryPath)) {
              try {
                summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              } catch (e) {
                core.warning(`failed to parse ${summaryPath}: ${e.message}`);
              }
            }
            if (fs.existsSync(triagePath)) {
              try {
                triage = JSON.parse(fs.readFileSync(triagePath, 'utf8'));
              } catch (e) {
                core.warning(`failed to parse ${triagePath}: ${e.message}`);
              }
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const latest = Array.isArray(summary.latest) ? summary.latest.slice(0, 10) : [];
            const latestText = latest.length
              ? latest.map((x, i) => `${i + 1}. [${x.severity || 'unknown'}] ${x.source || 'unknown'} :: ${x.code || 'unknown'} :: ${x.fingerprint || ''}`).join('\n')
              : 'No parsed incident details.';
            const nextCommands = Array.isArray(triage?.next_commands) ? triage.next_commands.slice(0, 3) : [];
            const nextCommandsText = nextCommands.length
              ? nextCommands.map((cmd) => `- ${cmd}`).join('\n')
              : '- (none)';

            const signatureSource = latest.length
              ? latest
                  .map((x) => `${x.source || 'unknown'}|${x.code || 'unknown'}|${x.fingerprint || ''}`)
                  .sort()
                  .join('||')
              : `detected:${summary.detected_incidents}|open:${summary.open_errors}`;
            const signature = crypto.createHash('sha1').update(signatureSource).digest('hex').slice(0, 12);

            const title = `[nightly-autotune][dedupe:${signature}] failed`;
            const body = [
              'Nightly autotune workflow failed.',
              '',
              `- dedupe_signature: ${signature}`,
              `- run: ${runUrl}`,
              `- likely_root_cause: ${triage?.likely_root_cause || 'unknown'}`,
              `- generated_at: ${summary.generated_at}`,
              `- detected_incidents: ${summary.detected_incidents}`,
              `- newly_added: ${summary.newly_added}`,
              `- updated_existing: ${summary.updated_existing}`,
              `- total_known_errors: ${summary.total_known_errors}`,
              `- open_errors: ${summary.open_errors}`,
              '',
              'Top triage commands:',
              nextCommandsText,
              '',
              'Latest incident fingerprints:',
              latestText,
              '',
              'Source artifacts:',
              '- artifacts/agent_triage.json',
              '- artifacts/agent_triage.md',
              '- artifacts/error_memory_summary.json',
              '- golden/error_memory.jsonl'
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Recurring nightly failure detected.',
                  '',
                  `- run: ${runUrl}`,
                  `- generated_at: ${summary.generated_at}`,
                  `- detected_incidents: ${summary.detected_incidents}`,
                  '',
                  'Top triage commands:',
                  nextCommandsText,
                  '',
                  'Latest incident fingerprints:',
                  latestText,
                ].join('\n'),
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              core.info('Created new deduplicated nightly failure issue');
            }

      - name: Create Pull Request
        if: steps.improvement.outputs.improved == 'true'
        id: nightly_pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/nightly-hint-autotune
          delete-branch: true
          title: "chore: nightly hint JSON autotune"
          commit-message: "chore: nightly hint JSON autotune"
          body: |
            Automated nightly hint improvement PR.

            - Runs verify and scorecard gates
            - Applies rule-based hint improvements to JSON/JSONL only
            - Enforces non-regression via improvement baseline
          add-paths: |
            golden/grade5_pack_v1.jsonl
            golden/improvement_baseline.json
            artifacts/autotune_report.json
            artifacts/report_autotune_candidates.json
            artifacts/report_autotune_apply.json
            artifacts/improvement_check.json
            artifacts/improvement_trend.json
            artifacts/improvement_trend.md
            artifacts/improvement_trend_history.jsonl
            golden/improvement_trend_history.jsonl
            docs/improvement/latest.json
            dist_ai_math_web_pages/docs/improvement/latest.json

      - name: Enable auto-merge for nightly PR
        if: steps.nightly_pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.nightly_pr.outputs.pull-request-number }}
          merge-method: squash
