name: Verify All + Scorecard

# ───────────────────────────────────────────────────────────
# POLICY: Event-driven only (push/PR/dispatch). Daily schedule
# removed — push to main already triggers CI, and manual
# dispatch covers ad-hoc needs.
# ───────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    paths:
      - "pipeline/**"
      - "data/**"
      - "tests/**"
      - "schemas/**"
      - ".github/workflows/**"
      - "docs/**"
      - "tools/**"
      - "scripts/**"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run verify:all
        id: verify
        run: npm run verify:all
        continue-on-error: true

      - name: Run pipeline quality gate (smoke data)
        if: hashFiles('data/smoke/problems.sample.jsonl') != ''
        run: |
          python -m pipeline.verify \
            --dataset data/smoke/problems.sample.jsonl \
            --report artifacts/pipeline_report.json
        continue-on-error: true

      - name: Run pipeline unit + integration tests
        run: |
          python -m pytest tests/unit/test_pipeline_schema.py \
                           tests/unit/test_pipeline_steps.py \
                           tests/unit/test_pipeline_license.py \
                           tests/unit/test_pipeline_correctness.py \
                           tests/unit/test_pipeline_scorecard.py \
                           tests/unit/test_pipeline_source_governance.py \
                           tests/unit/test_pipeline_generate.py \
                           tests/unit/test_pipeline_solver.py \
                           tests/unit/test_pipeline_oer_fetcher.py \
                           tests/unit/test_pipeline_agent_loop.py \
                           tests/unit/test_pipeline_auto_pipeline.py \
                           tests/integration/test_pipeline_verify.py \
                           tests/e2e/test_pipeline_e2e.py \
                           -q --tb=short
        continue-on-error: true

      - name: Self-heal verify failures
        if: steps.verify.outcome == 'failure'
        run: npm run self-heal:verify

      - name: Re-run verify after self-heal
        if: steps.verify.outcome == 'failure'
        run: npm run verify:all

      - name: Detect self-heal changes
        if: always()
        id: selfheal_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            git diff --name-only >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent triage report
        if: always()
        run: npm run triage:agent

      - name: Build web topic alignment report
        if: always()
        run: npm run topic:align

      - name: Build iteration output summary
        if: always()
        run: npm run summary:iteration

      - name: Create self-heal pull request
        if: steps.selfheal_changes.outputs.has_changes == 'true'
        id: selfheal_pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/ci-self-heal
          delete-branch: true
          title: "chore: automated self-heal for verify workflow"
          commit-message: "chore: automated self-heal for verify workflow"
          body: |
            Automated self-heal changes generated by Verify All workflow.

            Changed files:
            ${{ steps.selfheal_changes.outputs.changed_files }}

            Includes:
            - canonical JSON normalization
            - elementary bank auto-fix
            - docs/dist sync
            - refreshed triage artifacts

      - name: Enable auto-merge for self-heal PR
        if: steps.selfheal_pr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.selfheal_pr.outputs.pull-request-number }}
          merge-method: squash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-artifacts
          path: |
            artifacts/
            playwright-report/

  pipeline-verify:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [verify]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline verify
        run: |
          python -m pipeline.verify \
            --dataset data/smoke/problems.sample.jsonl \
            --report artifacts/pipeline_report.json

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: artifacts/pipeline_report.json

  auto_merge:
    needs: verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: verify-artifacts
          path: artifacts

      - name: Gate by scorecard
        run: node tools/check_scorecard_gate.cjs

      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
