<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>一元一次方程式（觀念導引）</title>
  <meta name="description" content="一元一次方程式觀念導引，從基礎到進階，AI 自動出題並逐步引導，適合國中數學銜接。">
  <meta property="og:title" content="一元一次方程式（觀念導引）">
  <meta property="og:description" content="從基礎到進階，AI 自動出題並逐步引導，適合國中數學銜接。">
  <meta property="og:image" content="../icons/icon-512.png">
  <meta property="og:type" content="website">
  <style>
    :root{
      --bg:#0b1020; --panel:#0f1733; --card:#121c3d;
      --text:#e6edf3; --muted:#9aa4b2; --line:#243055;
      --accent:#7ee787; --ok:#2ea043; --bad:#f85149;
    }
    body{margin:0; font-family:Segoe UI,Helvetica,Arial; background:var(--bg); color:var(--text)}
    header{padding:18px 16px; border-bottom:1px solid var(--line); background:linear-gradient(180deg, rgba(46,160,67,.12), rgba(0,0,0,0));}
    header .title{font-size:18px; font-weight:700}
    header .sub{color:var(--muted); font-size:13px; margin-top:6px; line-height:1.5}
    main{max-width:1000px; margin:0 auto; padding:16px}
    .grid{display:grid; grid-template-columns:1fr; gap:12px}

    .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px}
    .row{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin: 10px 0}
    label{color:var(--muted); font-size:14px}
    select,input{background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.12); color:var(--text); border-radius:10px; padding:10px 14px; font-size:16px}
    .btn{padding:10px 16px; border-radius:10px; border:1px solid var(--accent); background:rgba(46,160,67,.12); color:var(--accent); cursor:pointer; font-weight:bold;}
    .btn:hover{background:rgba(46,160,67,.2)}

    .eq{font-size:28px; padding:20px; text-align:center; border-radius:12px; background:#08102a; border:1px dashed var(--accent); margin: 20px 0; font-family: monospace;}

    .step-card {
        padding: 12px 16px;
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        border-left: 4px solid var(--accent);
        font-family: monospace;
        margin-bottom: 10px;
        line-height: 1.6;
        animation: slideIn 0.3s ease-out;
    }
    .step-num { font-weight: bold; color: var(--accent); margin-right: 8px; }

    @keyframes slideIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    .banner{padding:12px; border-radius:8px; margin-top:10px; text-align:center; font-weight:bold;}
    .banner.ok{background:rgba(46,160,67,.2); color:#b7f5c9; border:1px solid var(--ok);}
    .banner.bad{background:rgba(248,81,73,.2); color:#ffd2cf; border:1px solid var(--bad);}

    a{color:var(--accent); text-decoration:none; margin-right: 10px;}
  </style>
  <link rel="canonical" href="./">
<link rel="stylesheet" href="../shared/game_motion.css">
</head>
<body>
  <header>
    <div class="row" style="justify-content:space-between">
       <div>
         <div class="title">一元一次方程式（MATH Dataset 分級）</div>
         <div class="sub">基於 SymPy 運算核心與 OpenMathInstruct 導引技術 (Levels 1-5)</div>
       </div>
      <a href="../" style="font-size:14px">← 回首頁</a>
    </div>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <div class="row" style="justify-content: center;">
          <label>選擇難度：</label>
          <select id="difficulty">
            <option value="1">Level 1: 基礎移項 (一步)</option>
            <option value="2" selected>Level 2: 兩步運算 (移項+係數)</option>
            <option value="3">Level 3: 兩邊都有未知數</option>
            <option value="4">Level 4: 含括號 (分配律)</option>
            <option value="5">Level 5: 分數與進階</option>
          </select>
          <button class="btn" id="btnNew">出新題</button>
          <a class="btn" href="https://www.youtube.com/watch?v=6doP-BMqEVU" target="_blank" rel="noopener" style="text-decoration:none;">📺 觀看教學影片 (YouTube)</a>
        </div>

        <div class="eq" id="qText">請按「出新題」開始</div>

        <div id="interactionArea" style="display:none; text-align:center; margin-top:20px;">
            <div style="font-size:18px; margin-bottom:10px;">你的答案 x = </div>
            <input type="text" id="ansInput" placeholder="例如: 5 或 3/2" style="width:200px; text-align:center;">
            <button class="btn" id="btnCheck" style="margin-left:10px;">送出檢查</button>
            <div id="banner" class="banner" style="display:none; margin-top:15px;"></div>
        </div>
      </section>

      <section class="card" id="hintSection" style="display:none;">
        <h3 style="margin:0 0 15px 0; color:var(--accent);">🤖 AI 老師解題思路</h3>
        <button id="btnShowHint" class="btn" style="width:100%; border-style:dashed; opacity:0.8">💡 我卡住了，顯示下一步提示</button>
        <div id="hintContainer" style="margin-top:15px;"></div>
      </section>
    </div>
  </main>

<script>
  const els = {
    diff: document.getElementById('difficulty'),
    btnNew: document.getElementById('btnNew'),
    qText: document.getElementById('qText'),
    inter: document.getElementById('interactionArea'),
    inp: document.getElementById('ansInput'),
    btnCheck: document.getElementById('btnCheck'),
    banner: document.getElementById('banner'),
    hintSec: document.getElementById('hintSection'),
    btnHint: document.getElementById('btnShowHint'),
    hintCont: document.getElementById('hintContainer')
  };

  const params = new URLSearchParams(location.search);
  const API_BASE = params.get('api') || '';
  const FORCE_OFFLINE = params.get('offline') === '1';

  function apiUrl(path) {
    if (!API_BASE) return path;
    return API_BASE.replace(/\/$/, '') + path;
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function fmtSign(n) {
    return n >= 0 ? `+ ${n}` : `- ${Math.abs(n)}`;
  }

  function generateLocalLinear(level) {
    let sol = randInt(-9, 9);
    if (sol === 0) sol = randInt(1, 9);

    let question_text = '';
    let explanation = [];

    if (level === 1) {
      const mode = Math.random() < 0.5 ? 'add' : 'mul';
      if (mode === 'add') {
        const b = randInt(-12, 12) || 3;
        const c = sol + b;
        question_text = `解方程式：x ${fmtSign(b)} = ${c}`;
        explanation = [
          `題目：${question_text}`,
          `把 ${b} 移到右邊：x = ${c} - (${b})`,
          `x = ${sol}`
        ];
      } else {
        const a = randInt(2, 6) * (Math.random() < 0.5 ? -1 : 1);
        const c = a * sol;
        question_text = `解方程式：${a}x = ${c}`;
        explanation = [
          `題目：${question_text}`,
          `兩邊同除以 ${a}：x = ${c} / ${a}`,
          `x = ${sol}`
        ];
      }
    } else if (level === 2) {
      const a = randInt(2, 6) * (Math.random() < 0.5 ? -1 : 1);
      const b = randInt(-12, 12) || 5;
      const c = a * sol + b;
      question_text = `解方程式：${a}x ${fmtSign(b)} = ${c}`;
      explanation = [
        `題目：${question_text}`,
        `移項：${a}x = ${c} - (${b})`,
        `x = ${c - b} / ${a}`,
        `x = ${sol}`
      ];
    } else if (level === 3) {
      const a = randInt(2, 6) * (Math.random() < 0.5 ? -1 : 1);
      let c = randInt(2, 6) * (Math.random() < 0.5 ? -1 : 1);
      if (a === c) c += 1;
      const b = randInt(-8, 8);
      const d = a * sol + b - c * sol;
      question_text = `解方程式：${a}x ${fmtSign(b)} = ${c}x ${fmtSign(d)}`;
      explanation = [
        `題目：${question_text}`,
        `移項：${a}x - (${c}x) = ${d} - (${b})`,
        `${a - c}x = ${d - b}`,
        `x = ${sol}`
      ];
    } else if (level === 4) {
      const a = randInt(2, 5) * (Math.random() < 0.5 ? -1 : 1);
      const b = randInt(-6, 6) || 2;
      const rhs = a * (sol + b);
      question_text = `解方程式：${a}(x ${fmtSign(b)}) = ${rhs}`;
      explanation = [
        `題目：${question_text}`,
        `先分配律：${a}x ${fmtSign(a * b)} = ${rhs}`,
        `移項：${a}x = ${rhs} - (${a * b})`,
        `x = ${sol}`
      ];
    } else {
      const a = randInt(2, 6);
      const b = randInt(-8, 8);
      const k = randInt(2, 5);
      const rhs = Math.floor((a * sol + b) / k);
      const c = rhs * k;
      question_text = `解方程式：(${a}x ${fmtSign(b)}) ÷ ${k} = ${rhs}`;
      explanation = [
        `題目：${question_text}`,
        `兩邊同乘 ${k}：${a}x ${fmtSign(b)} = ${c}`,
        `移項：${a}x = ${c} - (${b})`,
        `x = ${sol}`
      ];
    }

    return {
      question_text,
      correct_answer: String(sol),
      explanation: explanation.join('\n')
    };
  }

  let currentQ = null;
  let currentStep = 0;
  let steps = [];
  let tutorRules = null;

  function safeStr(v) {
    return String(v == null ? '' : v);
  }

  function extractEquationText(questionText) {
    const s = safeStr(questionText).trim();
    const idx = s.indexOf('：');
    if (idx >= 0 && idx < s.length - 1) return s.slice(idx + 1).trim();
    return s;
  }

  async function loadTutorRulesLinear() {
    try {
      const res = await fetch('./tutor_rules_linear_eq.json', { cache: 'no-store' });
      if (!res.ok) return;
      const j = await res.json();
      if (!j || j.schema !== 'aimath.tutor_rules.v1') return;
      if (j.ruleset_id !== 'linear.linear_eq.tw.v1') return;
      tutorRules = j;
    } catch (_) {
      // ignore
    }
  }

  function buildRuleHintSteps(level, questionText) {
    const tiers = tutorRules?.hint_ladder?.tiers;
    if (!Array.isArray(tiers) || tiers.length < 3) return [];
    const equation = extractEquationText(questionText);
    const ctx = {
      '{equation}': equation,
      '{level}': String(level)
    };
    const out = [];
    for (let i = 0; i < 3; i++) {
      const t = tiers[i];
      const label = safeStr(t?.label).trim();
      let body = safeStr(t?.template).trim();
      if (!body) continue;
      for (const [k, v] of Object.entries(ctx)) body = body.split(k).join(v);
      out.push(label ? (label + '：' + body) : body);
    }
    return out;
  }

  async function newGame() {
      const diff = els.diff.value;
      els.qText.innerText = "題目生成中...";
      els.inter.style.display = 'none';
      els.hintSec.style.display = 'none';
      els.banner.style.display = 'none';
      els.inp.value = '';
      els.hintCont.innerHTML = '';
      currentStep = 0;

        let data = null;
        if (!FORCE_OFFLINE) {
          try {
            const res = await fetch(apiUrl('/v1/linear/next'), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({difficulty: parseInt(diff)})
            });
            if (!res.ok) throw new Error('API not ok');
            data = await res.json();
          } catch(e) {
            console.warn('API error, fallback to offline', e);
          }
        }

        if (!data) {
          data = generateLocalLinear(parseInt(diff));
        }

        currentQ = data;
        els.qText.innerText = data.question_text;
        els.inter.style.display = 'block';
        els.hintSec.style.display = 'block';

          // Parse steps (prepend tiered hint ladder if rules exist)
          const baseSteps = (data.explanation || "").split('\n').map(s => s.trim()).filter(Boolean);
          const ruleSteps = tutorRules ? buildRuleHintSteps(parseInt(diff), data.question_text) : [];
          steps = [...ruleSteps, ...baseSteps];
        els.btnHint.style.display = 'block';
        els.btnHint.innerText = "💡 顯示解題提示 (共 " + steps.length + " 步)";
  }

  function showNextStep() {
      if(currentStep < steps.length) {
          const div = document.createElement('div');
          div.className = 'step-card';
          div.innerHTML = `<span class="step-num">Step ${currentStep+1}</span> ${steps[currentStep]}`;
          els.hintCont.appendChild(div);
          currentStep++;
          if(currentStep >= steps.length) els.btnHint.style.display = 'none';
      }
  }

  async function checkAns() {
      if(!currentQ) return;
      const ans = els.inp.value;
      if(!ans) return;

      els.banner.style.display = 'block';
      els.banner.innerText = "檢查中...";
      els.banner.className = 'banner';

      try {
          const res = await fetch(apiUrl('/v1/linear/check'), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({user_answer: ans, question_data: currentQ})
          });
          const j = await res.json();

          if(j.correct) {
              els.banner.className = 'banner ok';
              els.banner.innerText = "🎉 正確！太棒了！已展開全部步驟。按「出新題」再來一題。";
              // Auto show all steps on success
              while(currentStep < steps.length) showNextStep();
          } else {
              els.banner.className = 'banner bad';
              els.banner.innerText = "還差一點：再檢查移項與符號、等式兩邊同做；可先看下方提示再試一次。";
          }
      } catch(e) {
         // Fallback
         if(ans.trim() === currentQ.correct_answer) {
             els.banner.className = 'banner ok';
           els.banner.innerText = "正確（離線檢查）！按「出新題」再來一題。";
         } else {
             els.banner.className = 'banner bad';
           els.banner.innerText = "答案不對（離線檢查）。再檢查移項/分配律/符號。";
         }
      }
  }

  els.btnNew.onclick = newGame;
  els.btnCheck.onclick = checkAns;
  els.btnHint.onclick = showNextStep;

  // Init
  (async function init(){
    await loadTutorRulesLinear();
    await newGame();
  })();
</script>
<script src="../shared/breadcrumb_jsonld.js"></script>
<script src="../shared/skip_to_content.js"></script>
<script src="../shared/game_motion.js" defer></script>
<script src="../shared/quiz_feedback.js" defer></script>
</body>
</html>
