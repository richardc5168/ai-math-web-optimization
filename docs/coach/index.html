<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G5 作業解題教練（Coach Mode）</title>
  <style>
    :root{
      --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e;
      --accent:#58a6ff; --ok:#2ea043; --warn:#d29922; --btn:#238636; --btn2:#1f6feb;
    }
    body{ margin:0; padding:20px; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .wrap{ max-width:980px; margin:0 auto; }
    h1{ margin:0 0 12px 0; color:var(--accent); }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-top:12px; }
    label{ color:var(--muted); font-size:13px; }
    select,input,button,textarea{ font:inherit; }
    select,input{ background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; }
    input{ min-width:260px; }
    button{ border:1px solid transparent; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:700; }
    .btn{ background:var(--btn); color:#fff; }
    .btn2{ background:var(--btn2); color:#fff; }
    .btnGhost{ background:transparent; border-color:var(--border); color:var(--text); }
    .q{ font-size:18px; line-height:1.7; white-space:pre-wrap; }
    .hint{ color:var(--muted); font-size:14px; }
    .banner{ padding:10px 12px; border-radius:8px; border:1px solid var(--border); margin-top:10px; }
    .banner.ok{ border-color:rgba(46,160,67,0.5); background:rgba(46,160,67,0.12); }
    .banner.warn{ border-color:rgba(210,153,34,0.55); background:rgba(210,153,34,0.10); }
    .mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace; }
    .small{ font-size:12px; color:var(--muted); }
    textarea{ width:100%; min-height:160px; background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>G5 作業解題教練（Coach Mode）</h1>
    <div class="small">
      目標：任何答案都可以繼續下一題（不影響原本各題庫頁面）。
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>題庫</label><br />
          <select id="selBank">
            <option value="fraction">分數（fraction-g5）</option>
            <option value="decimal">小數（decimal-unit4）</option>
            <option value="ratio">比率百分率（ratio-percent-g5）</option>
            <option value="life">生活應用（life-applications-g5）</option>
          </select>
        </div>
        <div>
          <label>使用者 ID（localStorage）</label><br />
          <span id="txtUid" class="mono">-</span>
        </div>
        <div>
          <label>事件數</label><br />
          <span id="txtCount" class="mono">0</span>
        </div>
        <div style="margin-left:auto">
          <button id="btnStart" class="btn2">開始 / 下一題</button>
          <button id="btnClear" class="btnGhost">清除紀錄</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="q" id="qText">按「開始 / 下一題」出題。</div>
      <div class="hint" id="qMeta"></div>

      <div class="row" style="margin-top:12px">
        <div>
          <label>你的答案（任意格式都可提交）</label><br />
          <input id="inpAns" placeholder="例如：3/4、1 2/3、0.75、25%..." />
        </div>
        <div style="align-self:flex-end">
          <button id="btnSubmit" class="btn">提交（可直接下一題）</button>
        </div>
      </div>

      <div id="banner" class="banner warn" style="display:none"></div>

      <div class="row" style="margin-top:12px">
        <button id="btnHint" class="btnGhost">提示 +1（L1→L3）</button>
        <button id="btnNextStep" class="btnGhost">下一步</button>
        <button id="btnSolution" class="btnGhost">完整解答</button>
        <span id="txtHelpStat" class="small"></span>
      </div>
      <div id="helpBox" class="banner warn" style="display:none"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:flex-end">
        <div>
          <div style="font-weight:700">事件匯出（JSON）</div>
          <div class="small">用於後續週報與弱點分析。</div>
        </div>
        <button id="btnExport" class="btnGhost">重新整理匯出</button>
      </div>
      <textarea id="txtExport" spellcheck="false"></textarea>
    </div>
  </div>

  <!-- banks (existing, unchanged) -->
  <script src="../fraction-g5/bank.js"></script>
  <script src="../decimal-unit4/bank.js"></script>
  <script src="../ratio-percent-g5/bank.js"></script>
  <script src="../life-applications-g5/bank.js"></script>

  <!-- coach logger -->
  <script src="../shared/coach_event_log.js"></script>
  <script src="../shared/attempt_telemetry.js"></script>

  <script>
  (function(){
    'use strict';

    const $ = (id) => document.getElementById(id);

    const bankMap = {
      fraction: () => (window.FRACTION_G5_BANK || []),
      decimal: () => (window.DECIMAL_UNIT4_BANK || []),
      ratio: () => (window.RATIO_PERCENT_G5_BANK || []),
      life: () => (window.LIFE_APPLICATIONS_G5_BANK || []),
    };

    function randomHex(nBytes){
      const bytes = new Uint8Array(nBytes);
      if (typeof crypto !== 'undefined' && crypto.getRandomValues){
        crypto.getRandomValues(bytes);
      } else {
        for (let i = 0; i < bytes.length; i++) bytes[i] = Math.floor(Math.random() * 256);
      }
      return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function newId(prefix){
      const a = randomHex(4);
      const b = randomHex(2);
      const c = randomHex(2);
      const d = randomHex(2);
      const e = randomHex(6);
      return `${String(prefix || 'id')}_${a}-${b}-${c}-${d}-${e}`;
    }

    const sessionId = newId('sess');

    const COACH_META_URL = '../coaching_meta/grade5.sample.json';
    const coachMetaByQuestionId = new Map();

    let help = null;
    let cur = {
      unit: null,
      q: null,
      startedAtMs: null,
      attemptId: null,
      attemptsCount: 0,
      lastUserAnswer: '',
      everCorrect: false,
    };

    function newHelpState(){
      return {
        currentHintLevel: 0,
        shownLevels: new Set(),
        shownCount: 0,
        firstShownAt: null,
        totalHintMs: 0,
        timerStart: null,
        usedNextStep: false,
        shownSolution: false,
        nextStepIndex: 0,
      };
    }

    function startHelpTimer(){
      if (!help) return;
      if (help.timerStart == null) help.timerStart = Date.now();
    }

    function pauseHelpTimer(){
      if (!help) return;
      if (help.timerStart != null){
        help.totalHintMs = Math.max(0, Number(help.totalHintMs || 0)) + Math.max(0, Date.now() - help.timerStart);
        help.timerStart = null;
      }
    }

    function liveHelpMs(){
      if (!help) return 0;
      const base = Math.max(0, Number(help.totalHintMs || 0));
      if (help.timerStart == null) return base;
      return base + Math.max(0, Date.now() - help.timerStart);
    }

    function updateHelpStat(){
      const el = $('txtHelpStat');
      if (!el) return;
      if (!help){
        el.textContent = '';
        return;
      }
      const levels = Array.from(help.shownLevels || []).sort((a,b)=>a-b).map(n => `L${n}`).join(',');
      const ms = liveHelpMs();
      const s = Math.round(ms / 1000);
      const parts = [];
      parts.push(`已看提示：${levels || '無'}`);
      parts.push(`點擊：${String(help.shownCount || 0)}`);
      parts.push(`提示時間：${String(s)}s`);
      if (help.usedNextStep) parts.push('已用「下一步」');
      if (help.shownSolution) parts.push('已看「完整解答」');
      el.textContent = parts.join(' ｜ ');
    }

    function showHelpBox(kind, title, body){
      const el = $('helpBox');
      if (!el) return;
      el.className = 'banner ' + (kind === 'ok' ? 'ok' : 'warn');
      el.innerHTML = `<div style="font-weight:700; margin-bottom:6px"></div><div></div>`;
      el.children[0].textContent = String(title || '');
      el.children[1].textContent = String(body || '');
      el.style.display = 'block';
    }

    function clearHelpBox(){
      const el = $('helpBox');
      if (!el) return;
      el.style.display = 'none';
      el.textContent = '';
    }

    async function loadCoachMeta(){
      try{
        const resp = await fetch(COACH_META_URL, { cache: 'no-store' });
        if (!resp.ok) return;
        const arr = await resp.json();
        if (!Array.isArray(arr)) return;
        for (const item of arr){
          const qid = item && item.question_id;
          if (qid) coachMetaByQuestionId.set(String(qid), item);
        }
      } catch (e) {
        // optional; fallback will use bank hints
      }
    }

    function pickRandom(arr){
      if (!Array.isArray(arr) || !arr.length) return null;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function refreshStats(){
      const uid = window.AIMathCoachLog?.getOrCreateUserId?.() || 'guest';
      $('txtUid').textContent = uid;
      const data = window.AIMathCoachLog?.listEvents?.({ limit: 1e9 }) || { events: [] };
      $('txtCount').textContent = String((data.events || []).length);
    }

    function showBanner(kind, text){
      const el = $('banner');
      el.className = 'banner ' + (kind === 'ok' ? 'ok' : 'warn');
      el.textContent = text;
      el.style.display = 'block';
    }

    function clearBanner(){
      $('banner').style.display = 'none';
      $('banner').textContent = '';
    }

    function normalizeAnswer(s){
      return String(s || '').trim().replace(/\s+/g, '');
    }

    function expectedAnswer(){
      if (!cur.q) return '';
      return (cur.q && cur.q.answer != null) ? String(cur.q.answer).trim() : '';
    }

    function computeCorrect(userAns){
      const expected = expectedAnswer();
      if (!expected) return false;
      return normalizeAnswer(userAns) === normalizeAnswer(expected);
    }

    function hintEntryForLevel(level){
      const qid = cur.q && (cur.q.id || null);
      const meta = qid ? coachMetaByQuestionId.get(String(qid)) : null;
      if (meta && Array.isArray(meta.hint_ladder)){
        const found = meta.hint_ladder.find(x => Number(x && x.level) === Number(level));
        if (found) return { title: found.title || `L${level} 提示`, body: found.body || '' };
      }
      const hints = cur.q && Array.isArray(cur.q.hints) ? cur.q.hints : null;
      if (hints && hints[level - 1]){
        return { title: `L${level} 提示`, body: String(hints[level - 1]) };
      }
      // fallback templates by unit
      if (cur.unit === 'fraction'){
        if (level === 1) return { title: 'L1 提示｜先看分母', body: '先確認分母是否相同；同分母先加分子。' };
        if (level === 2) return { title: 'L2 提示｜列式再約分', body: '把算式寫成「分子運算 / 原分母」，最後記得約分到最簡。' };
        return { title: 'L3 提示｜檢查', body: '檢查：分母是否保持？結果是否最簡？是否合理（介於 0 和 1 或大於 1）？' };
      }
      if (cur.unit === 'decimal'){
        if (level === 1) return { title: 'L1 提示｜先判斷變大變小', body: '先看乘除的數 >1 或 <1，判斷答案大概變大或變小。' };
        if (level === 2) return { title: 'L2 提示｜小數點規則', body: '乘以 10/100/1000 或 0.1/0.01/0.001 時，小數點左右移動對應格數。' };
        return { title: 'L3 提示｜估算檢查', body: '用估算檢查小數點位置是否合理（例如大約是原數的幾倍）。' };
      }
      if (cur.unit === 'ratio'){
        if (level === 1) return { title: 'L1 提示｜先找部分/全體', body: '先標出「部分」和「全體」，再決定是要算比率還是百分率。' };
        if (level === 2) return { title: 'L2 提示｜公式', body: '比率 = 部分 ÷ 全體；百分率 = 比率 × 100%。' };
        return { title: 'L3 提示｜檢查', body: '檢查：部分 < 全體 → 比率 < 1；百分率通常在 0%~100%（除非超過 1）。' };
      }
      return { title: `L${level} 提示`, body: '先把題目條件整理成清楚的算式，再用估算檢查答案合理性。' };
    }

    function recordHintShown(level){
      if (!help) return;
      startHelpTimer();
      if (help.firstShownAt == null) help.firstShownAt = Date.now();
      help.shownCount = Math.max(0, Number(help.shownCount || 0)) + 1;
      help.shownLevels.add(Number(level));
      window.AIMathCoachLog?.appendEvent?.({
        type: window.AIMathCoachLog.EventType.HINT_SHOWN,
        unit: cur.unit,
        question_id: (cur.q && cur.q.id) ? String(cur.q.id) : null,
        ts_ms: Date.now(),
        hint_level: Number(level),
        payload: { attempt_id: cur.attemptId || null },
      });
      updateHelpStat();
    }

    function finalizeAttempt(reason){
      if (!cur.q) return;
      if (Math.max(0, Number(cur.attemptsCount || 0)) <= 0) return;

      pauseHelpTimer();
      updateHelpStat();

      const uid = window.AIMathCoachLog?.getOrCreateUserId?.() || 'guest';
      const expected = expectedAnswer();
      const allowContinue = window.AIMathCoachLog?.allowContinueAlways?.() !== false;
      const endedAt = Date.now();

      window.AIMathAttemptTelemetry?.appendAttempt?.(uid, {
        attempt_id: cur.attemptId || newId('att'),
        user_id: uid,
        session_id: sessionId,
        ts_start: Number(cur.startedAtMs || endedAt),
        ts_end: endedAt,

        pack_id: '',
        module_id: 'coach',
        unit_id: cur.unit,
        kind: String(cur.q?.kind || 'unknown'),
        topic_tags: [],
        difficulty: String(cur.q?.difficulty || ''),

        question_id: String(cur.q?.id || ''),
        correct_answer: expected,
        user_answer: String(cur.lastUserAnswer || ''),

        is_correct: !!cur.everCorrect,
        judge_type: 'regex',
        attempts_count: Math.max(1, Number(cur.attemptsCount || 1)),

        hint: {
          shown_levels: Array.from((help && help.shownLevels) ? help.shownLevels : []).sort((a,b)=>a-b),
          shown_count: Math.max(0, Number(help?.shownCount || 0)),
          total_hint_ms: Math.max(0, Number(help?.totalHintMs || 0)),
          first_shown_at: help?.firstShownAt != null ? Number(help.firstShownAt) : undefined,
        },
        steps: {
          used_next_step: !!help?.usedNextStep,
          shown_solution: !!help?.shownSolution,
        },
        device: {
          platform: (typeof navigator !== 'undefined' ? navigator.platform : ''),
          ua: (typeof navigator !== 'undefined' ? navigator.userAgent : ''),
        },
      });

      window.AIMathCoachLog?.appendEvent?.({
        type: window.AIMathCoachLog.EventType.ATTEMPT_COMPLETED,
        unit: cur.unit,
        question_id: cur.q.id || null,
        ts_ms: Date.now(),
        allow_continue: allowContinue,
        payload: {
          attempt_id: cur.attemptId || null,
          reason: String(reason || 'next'),
          attempts_count: Math.max(1, Number(cur.attemptsCount || 1)),
          is_correct: !!cur.everCorrect,
        },
      });
    }

    function startNext(){
      clearBanner();
      clearHelpBox();
      updateHelpStat();

      // close previous attempt (one AttemptEvent per question)
      finalizeAttempt('next');

      const unit = $('selBank').value;
      const bank = bankMap[unit] ? bankMap[unit]() : [];
      const q = pickRandom(bank);

      cur.unit = unit;
      cur.q = q;
      cur.startedAtMs = Date.now();
      cur.attemptId = newId('att');
      cur.attemptsCount = 0;
      cur.lastUserAnswer = '';
      cur.everCorrect = false;
      help = newHelpState();
      updateHelpStat();

      if (!q){
        $('qText').textContent = '題庫為空或尚未載入。';
        $('qMeta').textContent = '';
        return;
      }

      const qText = (q.question != null) ? String(q.question) : (q.prompt != null ? String(q.prompt) : JSON.stringify(q));
      $('qText').textContent = qText;
      $('qMeta').textContent = `question_id=${q.id || '(no id)'} | unit=${unit}`;
      $('inpAns').value = '';
      $('inpAns').focus();

      window.AIMathCoachLog?.appendEvent?.({
        type: window.AIMathCoachLog.EventType.ATTEMPT_STARTED,
        unit,
        question_id: q.id || null,
        ts_ms: Date.now(),
        payload: { attempt_id: cur.attemptId },
      });

      refreshStats();
    }

    function submit(){
      clearBanner();
      if (!cur.q){
        showBanner('warn', '請先按「開始 / 下一題」出題。');
        return;
      }

      pauseHelpTimer();

      const userAns = String($('inpAns').value || '').trim();
      cur.attemptsCount = Math.max(0, Number(cur.attemptsCount || 0)) + 1;
      cur.lastUserAnswer = userAns;
      const durationMs = Math.max(0, Date.now() - (cur.startedAtMs || Date.now()));

      const isCorrectNow = computeCorrect(userAns);
      if (isCorrectNow) cur.everCorrect = true;

      // Coach Mode policy: always allow continue.
      const allowContinue = window.AIMathCoachLog?.allowContinueAlways?.() !== false;

      window.AIMathCoachLog?.appendEvent?.({
        type: window.AIMathCoachLog.EventType.ANSWER_SUBMITTED,
        unit: cur.unit,
        question_id: cur.q.id || null,
        ts_ms: Date.now(),
        allow_continue: allowContinue,
        payload: {
          attempt_id: cur.attemptId,
          attempts_count: Math.max(1, Number(cur.attemptsCount || 1)),
          is_correct_now: !!isCorrectNow,
          user_answer: userAns,
          duration_ms: durationMs,
        },
      });

      updateHelpStat();
      showBanner('ok', isCorrectNow
        ? '這次答對了！你也可以直接按「開始 / 下一題」繼續。'
        : '已提交（目前判定未答對）。你可以再試一次，或直接按「開始 / 下一題」繼續。'
      );
      refreshStats();
    }

    function onHintClick(){
      clearBanner();
      if (!cur.q){
        showBanner('warn', '請先按「開始 / 下一題」出題。');
        return;
      }
      if (!help) help = newHelpState();
      const nextLevel = Math.min(3, Math.max(0, Number(help.currentHintLevel || 0)) + 1);
      help.currentHintLevel = nextLevel;
      recordHintShown(nextLevel);
      const entry = hintEntryForLevel(nextLevel);
      showHelpBox('warn', entry.title, entry.body);
    }

    function onNextStepClick(){
      clearBanner();
      if (!cur.q){
        showBanner('warn', '請先按「開始 / 下一題」出題。');
        return;
      }
      if (!help) help = newHelpState();
      help.usedNextStep = true;
      startHelpTimer();

      const steps = (cur.q && Array.isArray(cur.q.steps)) ? cur.q.steps : null;
      if (!steps || !steps.length){
        showHelpBox('warn', '下一步', '這題目前沒有提供分步提示（steps）。你可以改用「提示 +1」或「完整解答」。');
        updateHelpStat();
        return;
      }
      const idx = Math.min(steps.length - 1, Math.max(0, Number(help.nextStepIndex || 0)));
      const stepText = String(steps[idx]);
      help.nextStepIndex = idx + 1;
      showHelpBox('warn', `下一步（${idx + 1}/${steps.length}）`, stepText);
      updateHelpStat();
    }

    function onSolutionClick(){
      clearBanner();
      if (!cur.q){
        showBanner('warn', '請先按「開始 / 下一題」出題。');
        return;
      }
      if (!help) help = newHelpState();
      help.shownSolution = true;
      startHelpTimer();
      const expected = expectedAnswer();
      const steps = (cur.q && Array.isArray(cur.q.steps)) ? cur.q.steps : null;
      const stepBlock = (steps && steps.length) ? `\n\n分步：\n- ${steps.map(s => String(s)).join('\n- ')}` : '';
      const body = expected ? `參考答案：${expected}${stepBlock}` : `參考答案：（題庫未提供 answer）${stepBlock}`;
      showHelpBox('warn', '完整解答（參考）', body);
      window.AIMathCoachLog?.appendEvent?.({
        type: window.AIMathCoachLog.EventType.HINT_SHOWN,
        unit: cur.unit,
        question_id: (cur.q && cur.q.id) ? String(cur.q.id) : null,
        ts_ms: Date.now(),
        hint_level: 99,
        payload: { attempt_id: cur.attemptId || null, solution: true },
      });
      updateHelpStat();
    }

    function exportJson(){
      $('txtExport').value = window.AIMathCoachLog?.exportEventsJson?.() || '{"version":1,"user_id":"guest","events":[]}';
    }

    function clearLog(){
      window.AIMathCoachLog?.clearEvents?.();
      refreshStats();
      exportJson();
      showBanner('warn', '已清除本機 Coach Mode 記錄。');
    }

    $('btnStart').addEventListener('click', startNext);
    $('btnSubmit').addEventListener('click', submit);
    $('btnHint').addEventListener('click', onHintClick);
    $('btnNextStep').addEventListener('click', onNextStepClick);
    $('btnSolution').addEventListener('click', onSolutionClick);
    $('btnExport').addEventListener('click', exportJson);
    $('btnClear').addEventListener('click', clearLog);

    // init
    loadCoachMeta();
    refreshStats();
    exportJson();
  })();
  </script>
</body>
</html>
