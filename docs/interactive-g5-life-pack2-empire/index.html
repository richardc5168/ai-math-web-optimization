    function gcd(a,b){ a = Math.abs(a); b = Math.abs(b); while (b){ const t=a%b; a=b; b=t; } return a || 1; }

    function simplifyFraction(n, d){
      n = Number(n); d = Number(d);
      if (!Number.isInteger(n) || !Number.isInteger(d) || d === 0) throw new Error('?�數?��??�誤');
      if (d < 0){ n = -n; d = -d; }
      const g = gcd(n,d);

    function parseFraction(text){
      const s0 = normalizeText(text);
      if (!s0) throw new Error('請輸?��?�?);
      const s = s0.replace(/\s+/g,'').trim();
      const frac = s.match(/^(-?\d+)\/(\d+)$/);
      if (frac){
        const n = Number(frac[1]);
        const d = Number(frac[2]);
        return simplifyFraction(n,d);
      }
      const v = Number(s);
      if (Number.isFinite(v) && Number.isInteger(v)) return [v, 1];
      throw new Error('?�數答�?請用 a/b（�?�?3/4�?);
    }

    function parseHHMM(text){
      const s = normalizeText(text);
      if (!s) throw new Error('請輸?��?�?);
      const m = s.match(/^(\d{1,2})\s*:\s*(\d{1,2})$/);
      if (!m) throw new Error('?��?請用 HH:MM（�?�?09:35�?);
      const hh = Number(m[1]);
      const mm = Number(m[2]);
      if (!Number.isInteger(hh) || !Number.isInteger(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) throw new Error('?��?範�??�誤');
      return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
    }

    function compareByMode(studentText, correctText, mode){

      if (m === 'fraction'){

        const [cn,cd] = parseFraction(correctText);
        return sn === cn && sd === cd;
      }
      if (m === 'hhmm') return parseHHMM(studentText) === parseHHMM(correctText);
      if (m === 'exact') return normalizeText(studentText).trim() === normalizeText(correctText).trim();
      if (m === 'money2'){
        const sv = parseStudentNumber(studentText);
        const cv = parseStudentNumber(correctText);
        const s2 = Math.round(sv * 100);
        const c2 = Math.round(cv * 100);
        return s2 === c2;
      }
      const sv = parseStudentNumber(studentText);
      const cv = parseStudentNumber(correctText);
      return nearlyEqual(sv, cv, 1e-9);
    }

    function uniqSortedInt(arr){
      const out = [];
      const seen = new Set();
      for (const x of (Array.isArray(arr) ? arr : [])){
        const n = Math.floor(Number(x));
        if (!Number.isFinite(n)) continue;
        if (n < 1) continue;
        if (seen.has(n)) continue;
        seen.add(n);
        out.push(n);
      }
      out.sort((a,b)=>a-b);

    function claimPreview(unitId, wantN, maxTiles){
      const id = unitById[unitId] ? unitId : UNITS[0].id;
      const d = empire.units[id] || {xp:0, owned:[], targets:[]};
      const limit = Math.max(1, Number(maxTiles || MAX_TILES_SMALL));
      const n = Math.max(0, Math.floor(Number(wantN) || 0));
      if (!n) return [];
      const owned = new Set(uniqSortedInt(d.owned));
      const selected = uniqSortedInt(d.targets).filter(i => i>=1 && i<=limit && !owned.has(i));
      const out = [];
      for (const i of selected){ if (out.length >= n) break; out.push(i); }
      for (let i=1;i<=limit && out.length < n;i++){ if (!owned.has(i) && !out.includes(i)) out.push(i); }
      return out;
    }

    function claimTiles(unitId, wantN, maxTiles){
      const id = unitById[unitId] ? unitId : UNITS[0].id;
      const d = empire.units[id] || {xp:0, owned:[], targets:[]};
      d.owned = uniqSortedInt(d.owned);
      d.targets = uniqSortedInt(d.targets);
      const limit = Math.max(1, Number(maxTiles || MAX_TILES_SMALL));
      const n = Math.max(0, Math.floor(Number(wantN) || 0));
      if (!n) return { claimed:0, ids:[] };

      const owned = new Set(d.owned);
      const selected = d.targets.filter(i => i>=1 && i<=limit && !owned.has(i));
      const toClaim = [];
      for (const i of selected){ if (toClaim.length >= n) break; toClaim.push(i); }
      for (let i=1;i<=limit && toClaim.length < n;i++){ if (!owned.has(i)) toClaim.push(i); }

      for (const i of toClaim) owned.add(i);
      d.owned = uniqSortedInt(Array.from(owned));
      const claimedSet = new Set(toClaim);
      d.targets = d.targets.filter(i => !claimedSet.has(i));
      empire.units[id] = d;
      saveEmpire();
      return { claimed: toClaim.length, ids: toClaim };
    }

      const i = Math.max(1, Math.floor(Number(tileIndex) || 0));
      if (i < 1 || i > limit) return;
      const owned = new Set(d.owned);

      const targets = new Set(d.targets);
      if (targets.has(i)) targets.delete(i); else targets.add(i);

    function gStop(){

      if (g.timer) clearInterval(g.timer);

      const kind = g._endKind || 'ok';
