# Strict local quality gate.
# Install once:
#   pip install -r requirements.txt
#   pre-commit install
# Run manually:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(gpt_key_.*\.txt|streamlit\.log|.*\.log|20251123_OK/.*|app_20251123.*\.txt)$'
      - id: end-of-file-fixer
        exclude: '^(gpt_key_.*\.txt|streamlit\.log|.*\.log|20251123_OK/.*|app_20251123.*\.txt)$'
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml

  - repo: local
    hooks:
      - id: policy-json-canonical
        name: Enforce policy JSON canonical format
        entry: node tools/check_policy_json_canonical.cjs
        language: system
        pass_filenames: false

      - id: ragweb-strict-checklist
        name: RAGWEB strict checklist
        entry: ./.venv/Scripts/python.exe scripts/run_checklist.py --spec tests/specs/precommit_checklist.json
        language: system
        pass_filenames: false

      - id: confirm-yes-commit
        name: Require YES to commit
        entry: ./.venv/Scripts/python.exe scripts/confirm_yes_commit.py
        language: system
        pass_filenames: false
        stages: [prepare-commit-msg]

      - id: print-pages-url
        name: Print web URL after commit
        entry: ./.venv/Scripts/python.exe scripts/print_pages_url.py
        language: system
        pass_filenames: false
        stages: [post-commit]
